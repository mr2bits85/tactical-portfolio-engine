services:
  # 1. The Local Test Database (Only exists on your laptop)
  tactical-db:
    image: postgres:15-alpine
    container_name: tactical_portfolio_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: portfolio_user
      POSTGRES_PASSWORD: local_password123
      POSTGRES_DB: portfolio_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data

  # 2. Your Application (Reads from the local DB)
  tactical-portfolio-engine:
    build: .
    container_name: tactical_portfolio_app
    ports:
      - "8501:8501"
    environment:
      - DEV_USER_EMAIL=dev@example.com
      # Point your app directly to the local 'tactical-db' container service
      - TACTICAL_DATABASE_URL=postgresql://portfolio_user:local_password123@tactical-db:5432/portfolio_dev
    volumes:
      - .:/app
    depends_on:
      - tactical-db
    restart: unless-stopped

# This must be at the very bottom, completely flush to the left edge (0 spaces)
volumes:
  postgres_test_data: